  name: CI/CD Pipeline

  on:
    push:
      branches:
        - main

  jobs:
    build-and-push:
      name: Build and Push Docker Images
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Log in to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Build and Push Frontend Image
          uses: docker/build-push-action@v5
          with:
            context: ./app-source/frontend
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/task-frontend:latest

        - name: Build and Push API Image
          uses: docker/build-push-action@v5
          with:
            context: ./app-source/api-server
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/task-api:latest

        - name: Build and Push Worker Image
          uses: docker/build-push-action@v5
          with:
            context: ./app-source/worker
            push: true
            tags: ${{ secrets.DOCKER_USERNAME }}/task-worker:latest