name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to DockerHub
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build API image
      - name: Build API image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-api:v1 ./app-source/api-server

      # 4. Push API image
      - name: Push API image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/task-api:v1

      # 5. Build Worker image
      - name: Build Worker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/task-worker:v1 ./app-source/worker

      # 6. Push Worker image
      - name: Push Worker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/task-worker:v1