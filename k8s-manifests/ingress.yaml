apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-manager-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      # 1. Route API traffic to the backend exactly as it is requested
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-service
            port:
              number: 5000
              
      # 2. Route all other traffic to the frontend web server
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80